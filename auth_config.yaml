# auth_config.yaml
# Seed users for all 4 roles.
# Passwords are bcrypt hashed. Plain text shown in comments for local dev only.
# Run: python scripts/hash_passwords.py to regenerate after changing passwords.
#
# Default credentials (change before any real use):
#   recruiter1 / recruit123
#   manager1   / manage123
#   exec1      / exec123
#   compliance1/ comply123

credentials:
  usernames:
    recruiter1:
      name: Alex Recruiter
      email: alex@company.com
      role: recruiter
      # Password hash generated by: stauth.Hasher(['recruit123']).generate()
      password: HASH_PLACEHOLDER_recruiter1

    manager1:
      name: Sam Manager
      email: sam@company.com
      role: manager
      password: HASH_PLACEHOLDER_manager1

    exec1:
      name: Jordan Executive
      email: jordan@company.com
      role: exec
      password: HASH_PLACEHOLDER_exec1

    compliance1:
      name: Casey Compliance
      email: casey@company.com
      role: compliance
      password: HASH_PLACEHOLDER_compliance1

cookie:
  name: sip_auth_cookie
  key: CHANGE_THIS_TO_A_RANDOM_SECRET_KEY_32CHARS
  expiry_days: 7
