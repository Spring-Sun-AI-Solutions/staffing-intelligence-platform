version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Staffing Intelligence Platform — Local Docker Compose
# Services: Postgres+pgvector, Redis, Ollama
# The Streamlit app runs OUTSIDE Docker (streamlit run app.py) so you get
# hot-reload during development. Everything else is containerised.
#
# Start:   docker-compose up -d
# Stop:    docker-compose down
# Logs:    docker-compose logs -f
# Reset:   docker-compose down -v   (WARNING: deletes all data)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-sip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sippassword}
      POSTGRES_DB:       ${POSTGRES_DB:-staffing}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sip}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sip_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM inference) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sip_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment if you have NVIDIA GPU + nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  default:
    name: sip_network
